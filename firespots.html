<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire Spots — Paws & Trails</title>

  <!-- Leaflet CSS and JS — must load before MapLibre bridge -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MapLibre GL — vector tile renderer for OpenFreeMap -->
  <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet"/>
  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

  <!-- Bridge between Leaflet and MapLibre -->
  <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet/leaflet-maplibre-gl.js"></script>

  <!-- Phosphor Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/light/style.css"/>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-firespots">

  <header>
    <div class="header-inner">
      <a href="index.html" class="back-btn">
        <i class="ph-light ph-arrow-left"></i>
      </a>
      <div class="header-text">
        <div class="logo">
          <i class="ph-light ph-flame"></i> Fire spots
        </div>
      </div>
      <span class="header-count" id="page-count"></span>
    </div>
  </header>

  <main>

    <!-- Overview map — pins for all fire spots -->
    <div id="firespots-map" class="overview-map"></div>

    <!-- Filters — type is single select, features are multi select -->
    <div class="filter-row">

      <div class="filter-bar">
        <span class="filter-label">Type</span>
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="official_bbq">
          <i class="ph-light ph-fire"></i> Official BBQ
        </button>
        <button class="filter-btn" data-filter="official_firepit">
          Official pit
        </button>
        <button class="filter-btn" data-filter="unofficial">
          Unofficial
        </button>
      </div>

      <div class="filter-bar">
        <span class="filter-label">Features</span>
        <button class="filter-btn bracket" data-feature="seating">
          <i class="ph-light ph-park"></i> With seating
        </button>
        <button class="filter-btn bracket" data-feature="firewood">
          <i class="ph-light ph-tree"></i> Wood provided
        </button>
        <button class="filter-btn bracket" data-feature="year_round">
          <i class="ph-light ph-calendar"></i> Year round
        </button>
      </div>

    </div>

    <!-- Fire spot cards — rendered by buildFirespotsPage() in app.js -->
    <div class="items-list" id="items-list"></div>

  </main>

  <!-- data.js must load before app.js -->
  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
