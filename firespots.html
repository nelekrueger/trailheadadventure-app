<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire Spots — Paws & Trails</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/light/style.css"/>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-firespots">

  <header>
    <div class="header-inner">
      <a href="index.html" class="back-btn">
        <i class="ph-light ph-arrow-left"></i>
      </a>
      <div class="header-text">
        <div class="logo">
          <i class="ph-light ph-flame"></i> Fire spots
        </div>
      </div>
      <span class="header-count" id="page-count"></span>
    </div>
  </header>

  <main>
    <div id="firespots-map" class="overview-map"></div>

    <div class="filter-row">

      <!-- Type filter — single select -->
      <div class="filter-bar">
        <span class="filter-label">Type</span>
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="official_bbq">
          <i class="ph-light ph-fire"></i> Official BBQ
        </button>
        <button class="filter-btn" data-filter="official_firepit">
          Official pit
        </button>
        <button class="filter-btn" data-filter="unofficial">
          Unofficial
        </button>
      </div>

      <!-- Feature filters — multi select -->
      <div class="filter-bar" id="feature-filters">
        <span class="filter-label">Features</span>
        <button class="filter-btn bracket" data-feature="seating">
          <i class="ph-light ph-park"></i> With seating
        </button>
        <button class="filter-btn bracket" data-feature="firewood">
          <i class="ph-light ph-tree"></i> Wood provided
        </button>
        <button class="filter-btn bracket" data-feature="year_round">
          <i class="ph-light ph-calendar"></i> Year round
        </button>
      </div>

    </div>

    <div class="items-list" id="items-list"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
