<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bike Routes — Paws & Trails</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/light/style.css"/>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-bikes">
  <header>
    <div class="header-inner">
      <a href="index.html" class="back-btn">
        <i class="ph-light ph-arrow-left"></i>
      </a>
      <div class="header-text">
        <div class="logo">
          <i class="ph-light ph-bicycle"></i> Bike routes
        </div>
      </div>
      <span class="header-count" id="page-count"></span>
    </div>
  </header>
  <main>
    <div id="bikes-map" class="overview-map"></div>
    <div class="filter-row">

      <!-- Difficulty — single select -->
      <div class="filter-bar">
        <span class="filter-label">Difficulty</span>
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="easy">Easy</button>
        <button class="filter-btn" data-filter="medium">Medium</button>
        <button class="filter-btn" data-filter="hard">Hard</button>
      </div>
    
      <!-- Distance brackets — multi select -->
      <div class="filter-bar" id="distance-filters">
        <span class="filter-label">Distance</span>
        <button class="filter-btn bracket" data-min="0"   data-max="30">
          <i class="ph-light ph-ruler"></i> Under 30 km
        </button>
        <button class="filter-btn bracket" data-min="30"  data-max="60">
          30–60 km
        </button>
        <button class="filter-btn bracket" data-min="60"  data-max="100">
          60–100 km
        </button>
        <button class="filter-btn bracket" data-min="100" data-max="9999">
          100 km+
        </button>
      </div>
    
    </div>
    <div class="items-list" id="items-list"></div>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
