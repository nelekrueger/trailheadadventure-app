<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trailhead</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- Phosphor Icons — light weight, free, no license required -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/light/style.css"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-text">
        <div class="logo">
          <i class="ph-light ph-mountains"></i>
          Trailhead
        </div>
        <p class="tagline">Handpicked routes, camps and places in the wild</p>
      </div>
    </div>
  </header>

  <main>

    <section class="map-section">
      <!-- Filter toggles — data-category matches layer keys in app.js -->
      <div class="filter-bar">
        <button class="filter-btn active" data-category="hikes">
          <i class="ph-light ph-boot"></i> Hikes & runs
        </button>
        <button class="filter-btn active" data-category="bikes">
          <i class="ph-light ph-bicycle"></i> Bike routes
        </button>
        <button class="filter-btn active" data-category="cafes">
          <i class="ph-light ph-fork-knife"></i> Cafes & food
        </button>
        <button class="filter-btn active" data-category="camps">
          <i class="ph-light ph-tent"></i> Camps
        </button>
      </div>
      <!-- Map rendered by buildHomePage() in app.js -->
      <div id="map"></div>
    </section>

    <section class="categories-section">
      <h2>Browse by category</h2>
      <div class="category-grid">

        <a href="hikes.html" class="category-card hikes">
          <i class="ph-light ph-boot cat-icon"></i>
          <span class="cat-name">Hikes & trail runs</span>
          <span class="cat-count" id="count-hikes">— routes</span>
        </a>

        <a href="bikes.html" class="category-card bikes">
          <i class="ph-light ph-bicycle cat-icon"></i>
          <span class="cat-name">Bike routes</span>
          <span class="cat-count" id="count-bikes">— routes</span>
        </a>

        <a href="cafes.html" class="category-card cafes">
          <i class="ph-light ph-fork-knife cat-icon"></i>
          <span class="cat-name">Cafes & restaurants</span>
          <span class="cat-count" id="count-cafes">— places</span>
        </a>

        <a href="camps.html" class="category-card camps">
          <i class="ph-light ph-tent cat-icon"></i>
          <span class="cat-name">Camps & shelters</span>
          <span class="cat-count" id="count-camps">— spots</span>
        </a>

      </div>
    </section>

  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
